<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AprilTag Web Detector (WASM)</title>
  <style>
    body { margin: 0; font-family: system-ui, Arial; background: #0b0b0b; color: #fff; }
    .wrap { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 12px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    video, canvas { width: 100%; max-width: 720px; border-radius: 12px; background: #111; }
    .panel { max-width: 720px; background: #111; padding: 12px; border-radius: 12px; }
    label { display:inline-flex; gap: 8px; align-items:center; }
    input { width: 120px; padding: 6px; border-radius: 8px; border: 1px solid #333; background: #0f0f0f; color: #fff; }
    button { padding: 10px 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; cursor: pointer; }
    pre { white-space: pre-wrap; word-break: break-word; margin: 0; }
    .hint { opacity: .8; font-size: 12px; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <button id="btnStart">Start camera</button>

      <label>
        Tag size (meters)
        <input id="tagSize" type="number" step="0.01" value="0.16" />
      </label>

      <label>
        Target Tag ID
        <input id="tagId" type="number" step="1" value="0" />
      </label>

      <label>
        Decimate (speed)
        <input id="decimate" type="number" step="0.5" value="2.0" />
      </label>
    </div>

    <video id="video" playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="panel">
      <div class="hint">
        • Run this from a local server (not file://) so the camera works.<br>
        • Pose needs camera intrinsics; we estimate them (OK for demos, rough for real measurements).<br>
        • This WASM wrapper exposes detect(), set_tag_size(), set_camera_info(), and pose output. :contentReference[oaicite:5]{index=5}
      </div>
      <hr style="border:0;border-top:1px solid #222;margin:12px 0">
      <pre id="out">Idle.</pre>
    </div>
  </div>

  <!-- apriltag_wasm.js must be in the same folder -->
  <script src="./apriltag_wasm.js"></script>
  <script>
    const video  = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const out    = document.getElementById('out');

    const btnStart = document.getElementById('btnStart');
    const tagSizeEl = document.getElementById('tagSize');
    const tagIdEl   = document.getElementById('tagId');
    const decEl     = document.getElementById('decimate');

    let ctx, stream, apriltag, running = false;

    function estimateIntrinsics(w, h) {
      // Browser doesn't give real intrinsics reliably.
      // Simple approximation:
      // fx = fy = w (rough), cx = w/2, cy = h/2
      // This is "good enough" for demo pose, but distance will be noisy.
      const fx = w;
      const fy = w;
      const cx = w / 2;
      const cy = h / 2;
      return { fx, fy, cx, cy };
    }

    function drawDetection(det) {
      const c = det.corners;
      ctx.beginPath();
      ctx.moveTo(c[0].x, c[0].y);
      ctx.lineTo(c[1].x, c[1].y);
      ctx.lineTo(c[2].x, c[2].y);
      ctx.lineTo(c[3].x, c[3].y);
      ctx.closePath();
      ctx.lineWidth = 3;
      ctx.strokeStyle = "lime";
      ctx.stroke();

      ctx.fillStyle = "lime";
      ctx.font = "18px system-ui";
      ctx.fillText(`ID ${det.id}`, det.center.x + 6, det.center.y - 6);
    }

    async function loop() {
      if (!running) return;

      // Draw video frame to canvas
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      // Extract pixels and grayscale
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const p = img.data;
      const gray = new Uint8Array(canvas.width * canvas.height);
      for (let i = 0, j = 0; i < p.length; i += 4, j++) {
        gray[j] = (p[i] + p[i+1] + p[i+2]) / 3;
      }

      // Update tag size and camera info
      const tagId = Number(tagIdEl.value || 0);
      const tagSize = Number(tagSizeEl.value || 0.16);

      // The wrapper supports per-ID tag sizes via set_tag_size(). :contentReference[oaicite:6]{index=6}
      apriltag.set_tag_size(tagId, tagSize);

      const { fx, fy, cx, cy } = estimateIntrinsics(canvas.width, canvas.height);
      apriltag.set_camera_info(fx, fy, cx, cy); // required for pose :contentReference[oaicite:7]{index=7}

      // Tune speed if your build exposes options (some builds keep it internal).
      // If your apriltag_wasm.js exposes setters, you can set quad_decimate there.
      // Otherwise, decimation may be fixed by the build defaults.

      // Detect
      const detections = await apriltag.detect(gray, canvas.width, canvas.height);

      // Redraw clean overlay
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      let lines = [];
      lines.push(`Detections: ${detections.length}`);

      for (const det of detections) {
        drawDetection(det);

        // Pose fields: det.pose.R (rotation matrix), det.pose.t (translation) when enabled. :contentReference[oaicite:8]{index=8}
        if (det.pose && det.pose.t) {
          const tx = det.pose.t[0], ty = det.pose.t[1], tz = det.pose.t[2];
          const distance = Math.sqrt(tx*tx + ty*ty + tz*tz);
          lines.push(`ID ${det.id} | t=[${tx.toFixed(3)}, ${ty.toFixed(3)}, ${tz.toFixed(3)}] m | dist=${distance.toFixed(3)} m`);
          // R is 3x3; you can convert to yaw/pitch/roll if needed
          // lines.push(`R=${JSON.stringify(det.pose.R)}`);
        } else {
          lines.push(`ID ${det.id} | pose not available`);
        }
      }

      out.textContent = lines.join("\n");

      requestAnimationFrame(loop);
    }
    
    btnStart.addEventListener('click', async () => {
        if (running) return;

        try {
            out.textContent = "Initializing detector (WASM)…";
            apriltag = await createAprilTagDetector();
            out.textContent = "Detector ready. Starting camera…";

            stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false
            });

            video.srcObject = stream;
            await video.play();

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx = canvas.getContext('2d', { willReadFrequently: true });

            running = true;
            out.textContent = "Running… point at a tag.";
            loop();
        } catch (err) {
            console.error(err);
            out.textContent = "Error: " + (err?.message || err);
        }
    });

    async function createAprilTagDetector() {
        // Pattern A: AprilTagWasm is a factory that returns (or resolves to) a detector
        try {
        const maybe = AprilTagWasm();
        const det = (maybe && typeof maybe.then === "function") ? await maybe : maybe;
        if (det) return det;
        } catch (e) {}

        // Pattern B: AprilTagWasm is a constructor (class/function)
        try {
        const det = new AprilTagWasm();
        // Some builds use init(), some use ready()
        if (typeof det.init === "function") await det.init();
        if (typeof det.ready === "function") await det.ready();
        return det;
        } catch (e) {}

        // Pattern C: AprilTagWasm is a module object with nested constructor
        try {
        if (AprilTagWasm && typeof AprilTagWasm.AprilTagWasm === "function") {
            const det = new AprilTagWasm.AprilTagWasm();
            if (typeof det.init === "function") await det.init();
            if (typeof det.ready === "function") await det.ready();
            return det;
        }
        } catch (e) {}

        // Pattern D: static create()
        try {
        if (AprilTagWasm && typeof AprilTagWasm.create === "function") {
            return await AprilTagWasm.create();
        }
        } catch (e) {}

        throw new Error("Unsupported AprilTagWasm export shape. We need to inspect its API.");
    }

    function getMethods(obj) {
        if (!obj) return [];
        const proto = Object.getPrototypeOf(obj);
        return Array.from(new Set([
        ...Object.getOwnPropertyNames(obj),
        ...(proto ? Object.getOwnPropertyNames(proto) : [])
        ])).sort();
    }

    async function runDetect(detector, gray, w, h) {
        // Try common method names
        if (typeof detector.detect === "function") return await detector.detect(gray, w, h);
        if (typeof detector.detectTags === "function") return await detector.detectTags(gray, w, h);
        if (typeof detector.detect_async === "function") return await detector.detect_async(gray, w, h);
        if (typeof detector.run === "function") return await detector.run(gray, w, h);

        throw new Error("No detect method found. Methods: " + getMethods(detector).join(", "));
    }
  </script>
</body>
</html>
